<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Set New Password - Wall of Fame</title>
    <style>
        :root { --primary: #10B981; --bg: #F3F4F6; --card: #FFF; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px; margin: 15px 0; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:hover { background: #059669; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Create New Password</h2>
        <form id="resetForm">
            <input type="password" id="newPass" placeholder="Enter new password" required>
            <button type="submit">Update Password</button>
        </form>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            // Get the secure token out of the URL (e.g., ?token=abc123xyz)
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const newPassword = document.getElementById('newPass').value;

            if(!token) return alert("No reset token found in URL. Please click the link in your email again.");

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();
                
                if(res.ok) {
                    alert(data.message);
                    window.location.href = 'login.html';
                } else {
                    alert(data.error);
                }
            } catch(err) { alert("Error resetting password."); }
        });
    </script>
</body>
</html>
