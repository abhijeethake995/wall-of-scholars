<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Wall of Fame</title>
    <style>
        :root { --primary: #2563EB; --bg: #F3F4F6; --card: #FFF; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px; margin: 15px 0; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:hover { background: #1D4ED8; }
        a { color: var(--primary); text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Forgot Password?</h2>
        <p style="color: gray; font-size: 0.9rem;">Enter your email and we'll send you a reset link.</p>
        <form id="forgotForm">
            <input type="email" id="email" placeholder="Your registered email" required>
            <button type="submit">Send Reset Link</button>
        </form>
        <p style="margin-top: 15px;"><a href="login.html">Back to Login</a></p>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.querySelector('button');
            btn.innerText = "Sending..."; btn.disabled = true;

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email })
                });
                const data = await res.json();
                alert(data.message || data.error);
            } catch(err) { alert("Error sending request."); }
            
            btn.innerText = "Send Reset Link"; btn.disabled = false;
        });
    </script>
</body>
</html>
